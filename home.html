<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>
    <link rel="stylesheet" href="./src/input.css" />
    <!-- FontAwsome -->

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Daisy Ui and Tailwind css link -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <header>
      <div class="navbar bg-base-100 shadow-sm px-10 flex-col md:flex-row">
        <div class="flex-1 flex items-center gap-1">
          <img src="./assets/github-logo.png" alt="" class="w-[36px]" />
          <h1 class="text-2xl font-semibold">GitHub Issues Tracker</h1>
        </div>
        <div class="flex gap-2">
          <label class="input">
            <svg
              class="h-[1em] opacity-50"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
            >
              <g
                stroke-linejoin="round"
                stroke-linecap="round"
                stroke-width="2.5"
                fill="none"
                stroke="currentColor"
              >
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.3-4.3"></path>
              </g>
            </svg>
            <input type="search" required placeholder="Search issues..." />
          </label>
          <button class="btn btn-primary hidden md:block">
            <i class="fa-solid fa-plus"></i> New Issue
          </button>
        </div>
      </div>
    </header>

    <!-- Main Section -->

    <main class="w-10/12 mx-auto ">
      <!-- Category btn -->
      <section class="p-4 shadow-xl my-4 space-x-2 rounded-lg">
        <button class="btn btn-primary px-10" id="allBtn">All</button>
        <button class="btn px-10" id="openBtn">Open</button>
        <button class="btn px-10" id="closeBtn">Close</button>
      </section>
      <!-- Issue Section -->
      <section class="mt-4 bg-white space-x-2 rounded-lg">
        <div class="p-6 flex items-center justify-between shadow-lg gap-4">
          <div class="md:flex gap-2 items-center">
            <figure
              class="p-1 rounded-full bg-gray-200 w-12 h-12 flex items-center justify-center"
            >
              <img src="./assets/Aperture.png" alt="" class="" />
            </figure>
            <div>
              <h2 class="font-bold text-lg"><span>50</span> Issues</h2>
              <p class="text-gray-500">Track and manage your project issues</p>
            </div>
          </div>

          <div class="flex items-center gap-3">
            <h4 class="font-medium"><i class="fa-solid fa-circle text-green-500"></i> Open</h4>
            <h4 class="font-medium"><i class="fa-solid fa-circle text-purple-700"></i> Closed</h4>
          </div>
        </div>


        <!-- All Issue Show Container -->

        <div id="allIssueContainer" class="p-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5 justify-items-center">
            <div class=" p-4 bg-blue-50  rounded-lg  border-t-4 border-green-500 space-y-2.5">
                <div class="flex justify-between items-center">
                    <img src="./assets/Open-Status.png" alt="" >
                    <button class="px-8 py-1 rounded-4xl bg-red-100 text-red-500">HIGH</button>

                </div>
                <h1 class="font-semibold text-lg">Fix navigation menu on mobile devicess</h1>
                <p class="text-gray-500">The navigation menu doesn't collapse properly on mobile devices...</p>
                <div>
                    <button class="px-2 py-1 rounded-4xl bg-red-100 text-red-500 border border-red-500"><i class="fa-solid fa-bug"></i> BUG</button>
                    <button class="px-2 py-1 rounded-4xl bg-yellow-100 text-yellow-600 border border-yellow-500"><i class="fa-solid fa-life-ring"></i> HELP WANTED</button>

                </div>
                <div class="text-gray-500 border-t border-gray-300 pt-2.5">
                    <p>#1 by John_deo</p>
                    <p>1/15/2024</p>
                </div>
                
            </div>
            

        </div>
      </section>
    </main>

    <!-- JavaScript Pluging -->
    <script src="script/login.js"></script>
    <script src="script/app.js"></script>
  </body>
</html>
