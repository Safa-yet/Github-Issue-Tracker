<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github-Tracker-Login</title>


    <!-- Daisy Ui and Tailwind css link -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>



</head>
<body>
   <!-- Login Form -->

   <div class="max-w-[520px] mx-auto  m-10 p-8 border">
    <div class="text-center space-y-1.5">
        <img src="./assets/github-logo.png" alt="" class="mx-auto">
        <h1 class="text-2xl font-semibold">GitHub Issues Tracker</h1>
        <p>Sign in to manage your issues</p>
    </div>
    
    <!-- LoginForm -->
     <!-- <div class="hero bg-base-200 min-h-screen"> -->
  <!-- <div class="hero-content flex-col lg:flex-row-reverse"> -->
    
    <div class="card bg-base-100 w-full  shrink-0 ">
      <div class="card-body">
        <fieldset class="fieldset">
          <label class="label">Username</label>
          <input type="email" class="input w-full" placeholder="Username" />
          <label class="label">Password</label>
          <input type="password" class="input w-full" placeholder="Password" />
          <div><a class="link link-hover">Forgot password?</a></div>
          <button class="btn btn-neutral mt-4">Login</button>
          <h3 class="text-center my-6 text-xl font-semibold">OR</h3>
        </fieldset>
      </div>
    </div>
  <!-- </div> -->
<!-- </div> -->
   </div>
</body>
</html>
